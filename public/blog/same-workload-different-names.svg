<svg viewBox="0 0 1200 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="550" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#003366">
    Same Workload, Different Names
  </text>

  <!-- Table Header -->
  <rect x="60" y="70" width="1080" height="60" fill="#003366"/>
  <text x="210" y="105" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Provider</text>
  <text x="450" y="105" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Instance Name</text>
  <text x="700" y="105" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Capacity Unit</text>
  <text x="950" y="105" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Monthly Cost</text>

  <!-- Dividers in header -->
  <line x1="320" y1="70" x2="320" y2="130" stroke="white" stroke-width="1"/>
  <line x1="580" y1="70" x2="580" y2="130" stroke="white" stroke-width="1"/>
  <line x1="830" y1="70" x2="830" y2="130" stroke="white" stroke-width="1"/>

  <!-- Row 1: AWS -->
  <rect x="60" y="130" width="1080" height="80" fill="#f5f5f5"/>
  <text x="210" y="170" font-size="12" text-anchor="middle" fill="#333">AWS</text>
  <text x="450" y="170" font-size="12" text-anchor="middle" fill="#333">t3.xlarge</text>
  <text x="700" y="170" font-size="12" text-anchor="middle" fill="#333">4 vCPU</text>
  <text x="950" y="170" font-size="12" text-anchor="middle" fill="#333">$98</text>

  <line x1="320" y1="130" x2="320" y2="210" stroke="#ddd" stroke-width="1"/>
  <line x1="580" y1="130" x2="580" y2="210" stroke="#ddd" stroke-width="1"/>
  <line x1="830" y1="130" x2="830" y2="210" stroke="#ddd" stroke-width="1"/>

  <!-- Row 2: Azure -->
  <rect x="60" y="210" width="1080" height="80" fill="white"/>
  <text x="210" y="250" font-size="12" text-anchor="middle" fill="#333">Azure</text>
  <text x="450" y="250" font-size="12" text-anchor="middle" fill="#333">Standard_D4s_v3</text>
  <text x="700" y="250" font-size="12" text-anchor="middle" fill="#333">4 vCPU</text>
  <text x="950" y="250" font-size="12" text-anchor="middle" fill="#333">$128</text>

  <line x1="320" y1="210" x2="320" y2="290" stroke="#ddd" stroke-width="1"/>
  <line x1="580" y1="210" x2="580" y2="290" stroke="#ddd" stroke-width="1"/>
  <line x1="830" y1="210" x2="830" y2="290" stroke="#ddd" stroke-width="1"/>

  <!-- Row 3: Google Cloud -->
  <rect x="60" y="290" width="1080" height="80" fill="#f5f5f5"/>
  <text x="210" y="330" font-size="12" text-anchor="middle" fill="#333">Google Cloud</text>
  <text x="450" y="330" font-size="12" text-anchor="middle" fill="#333">n2-standard-4</text>
  <text x="700" y="330" font-size="12" text-anchor="middle" fill="#333">4 vCPU</text>
  <text x="950" y="330" font-size="12" text-anchor="middle" fill="#333">$118</text>

  <line x1="320" y1="290" x2="320" y2="370" stroke="#ddd" stroke-width="1"/>
  <line x1="580" y1="290" x2="580" y2="370" stroke="#ddd" stroke-width="1"/>
  <line x1="830" y1="290" x2="830" y2="370" stroke="#ddd" stroke-width="1"/>

  <!-- Row 4: Oracle Cloud -->
  <rect x="60" y="370" width="1080" height="80" fill="white"/>
  <text x="210" y="410" font-size="12" text-anchor="middle" fill="#333">Oracle Cloud</text>
  <text x="450" y="410" font-size="12" text-anchor="middle" fill="#333">VM.Standard.E4.Flex</text>
  <text x="700" y="410" font-size="12" text-anchor="middle" fill="#333">4 OCPU</text>
  <text x="950" y="410" font-size="12" text-anchor="middle" fill="#333">$88</text>

  <line x1="320" y1="370" x2="320" y2="450" stroke="#ddd" stroke-width="1"/>
  <line x1="580" y1="370" x2="580" y2="450" stroke="#ddd" stroke-width="1"/>
  <line x1="830" y1="370" x2="830" y2="450" stroke="#ddd" stroke-width="1"/>

  <!-- Row 5: DigitalOcean -->
  <rect x="60" y="450" width="1080" height="80" fill="#f5f5f5"/>
  <text x="210" y="490" font-size="12" text-anchor="middle" fill="#333">DigitalOcean</text>
  <text x="450" y="490" font-size="12" text-anchor="middle" fill="#333">Droplet 4GB</text>
  <text x="700" y="490" font-size="12" text-anchor="middle" fill="#333">4 shared vCPU</text>
  <text x="950" y="490" font-size="12" text-anchor="middle" fill="#333">$30</text>

  <line x1="320" y1="450" x2="320" y2="530" stroke="#ddd" stroke-width="1"/>
  <line x1="580" y1="450" x2="580" y2="530" stroke="#ddd" stroke-width="1"/>
  <line x1="830" y1="450" x2="830" y2="530" stroke="#ddd" stroke-width="1"/>

  <!-- Outer table border -->
  <rect x="60" y="70" width="1080" height="460" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Footer note -->
  <text x="600" y="530" font-size="11" text-anchor="middle" fill="#666" font-style="italic">
    Same workload. Different names. That's why manual comparison fails.
  </text>
</svg>