<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#003366">
    Storage Cost Multipliers by Redundancy Tier
  </text>

  <!-- Y-axis label -->
  <text x="30" y="350" font-size="13" text-anchor="middle" fill="#333" transform="rotate(-90 30 350)">
    Monthly Cost ($)
  </text>

  <!-- Y-axis -->
  <line x1="80" y1="80" x2="80" y2="550" stroke="#333" stroke-width="2"/>

  <!-- X-axis -->
  <line x1="80" y1="550" x2="1100" y2="550" stroke="#333" stroke-width="2"/>

  <!-- Y-axis scale -->
  <line x1="75" y1="550" x2="85" y2="550" stroke="#333" stroke-width="1"/>
  <text x="65" y="555" font-size="12" text-anchor="end" fill="#333">$0</text>

  <line x1="75" y1="460" x2="85" y2="460" stroke="#333" stroke-width="1"/>
  <text x="65" y="465" font-size="12" text-anchor="end" fill="#333">$25</text>

  <line x1="75" y1="370" x2="85" y2="370" stroke="#333" stroke-width="1"/>
  <text x="65" y="375" font-size="12" text-anchor="end" fill="#333">$50</text>

  <line x1="75" y1="280" x2="85" y2="280" stroke="#333" stroke-width="1"/>
  <text x="65" y="285" font-size="12" text-anchor="end" fill="#333">$75</text>

  <line x1="75" y1="190" x2="85" y2="190" stroke="#333" stroke-width="1"/>
  <text x="65" y="195" font-size="12" text-anchor="end" fill="#333">$100</text>

  <!-- AWS S3 stacked bar: $23 (Single) + $23 (Zone) + $24 (Geo) = $70 -->
  <!-- Single-Zone/Standard: 23 out of 70 = 0.33 ratio -->
  <rect x="200" y="390" width="60" height="160" fill="#003d99"/>
  <!-- Zone-Redundant: 23 out of 70 = 0.33 ratio -->
  <rect x="200" y="280" width="60" height="110" fill="#0052cc"/>
  <!-- Geo-Redundant: 24 out of 70 = 0.34 ratio -->
  <rect x="200" y="160" width="60" height="120" fill="#0066ff"/>

  <text x="230" y="570" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">AWS S3</text>
  <text x="230" y="590" font-size="11" text-anchor="middle" fill="#666">$70/mo</text>

  <!-- Azure Blob stacked bar: $23 (Single) + $35 (Zone) + $37 (Geo) = $95 -->
  <!-- Single-Zone: 23 out of 95 = 0.24 ratio -->
  <rect x="380" y="425" width="60" height="125" fill="#003d99"/>
  <!-- Zone-Redundant: 35 out of 95 = 0.37 ratio -->
  <rect x="380" y="270" width="60" height="155" fill="#0052cc"/>
  <!-- Geo-Redundant: 37 out of 95 = 0.39 ratio -->
  <rect x="380" y="95" width="60" height="175" fill="#0066ff"/>

  <text x="410" y="570" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Azure Blob</text>
  <text x="410" y="590" font-size="11" text-anchor="middle" fill="#666">$95/mo</text>

  <!-- Google Cloud stacked bar: $22 (Standard) + $22 (Nearline) + $16 (Coldline) = $60 -->
  <!-- Standard: 22 out of 60 = 0.37 ratio -->
  <rect x="560" y="380" width="60" height="170" fill="#003d99"/>
  <!-- Nearline: 22 out of 60 = 0.37 ratio -->
  <rect x="560" y="210" width="60" height="170" fill="#0052cc"/>
  <!-- Coldline: 16 out of 60 = 0.27 ratio -->
  <rect x="560" y="82" width="60" height="128" fill="#0066ff"/>

  <text x="590" y="570" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Google Cloud</text>
  <text x="590" y="590" font-size="11" text-anchor="middle" fill="#666">$60/mo</text>

  <!-- Legend -->
  <rect x="700" y="120" width="350" height="140" fill="#f9f9f9" stroke="#ddd" stroke-width="1" rx="4"/>

  <rect x="720" y="140" width="16" height="16" fill="#003d99"/>
  <text x="745" y="152" font-size="12" fill="#333">Single-Zone/Standard</text>

  <rect x="720" y="170" width="16" height="16" fill="#0052cc"/>
  <text x="745" y="182" font-size="12" fill="#333">Zone-Redundant</text>

  <rect x="720" y="200" width="16" height="16" fill="#0066ff"/>
  <text x="745" y="212" font-size="12" fill="#333">Geo-Redundant</text>

  <text x="720" y="235" font-size="10" fill="#666" font-style="italic">
    Redundancy adds 50-300% to storage costs
  </text>

  <!-- Insight -->
  <text x="600" y="670" font-size="12" text-anchor="middle" fill="#666" font-style="italic">
    Large-scale storage: redundancy choices compound. Factor them in early.
  </text>
</svg>