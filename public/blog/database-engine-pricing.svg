<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#003366">
    Database Engine Pricing by Type
  </text>

  <!-- Table Header -->
  <rect x="60" y="70" width="1080" height="60" fill="#003366"/>
  <text x="280" y="105" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Database Type</text>
  <text x="650" y="105" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Examples</text>
  <text x="1000" y="105" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Typical Range</text>

  <!-- Dividers in header -->
  <line x1="450" y1="70" x2="450" y2="130" stroke="white" stroke-width="1"/>
  <line x1="850" y1="70" x2="850" y2="130" stroke="white" stroke-width="1"/>

  <!-- Row 1: Relational (Open) -->
  <rect x="60" y="130" width="1080" height="90" fill="#f5f5f5"/>
  <text x="280" y="170" font-size="12" text-anchor="middle" fill="#333">Relational (Open)</text>
  <text x="650" y="170" font-size="12" text-anchor="middle" fill="#333">PostgreSQL, MySQL</text>
  <text x="1000" y="170" font-size="12" text-anchor="middle" fill="#333">$300-800/mo</text>

  <line x1="450" y1="130" x2="450" y2="220" stroke="#ddd" stroke-width="1"/>
  <line x1="850" y1="130" x2="850" y2="220" stroke="#ddd" stroke-width="1"/>

  <!-- Row 2: Relational (Proprietary) -->
  <rect x="60" y="220" width="1080" height="90" fill="white"/>
  <text x="280" y="260" font-size="12" text-anchor="middle" fill="#333">Relational (Proprietary)</text>
  <text x="650" y="260" font-size="12" text-anchor="middle" fill="#333">Oracle, SQL Server</text>
  <text x="1000" y="260" font-size="12" text-anchor="middle" fill="#333">$800-3,000/mo</text>

  <line x1="450" y1="220" x2="450" y2="310" stroke="#ddd" stroke-width="1"/>
  <line x1="850" y1="220" x2="850" y2="310" stroke="#ddd" stroke-width="1"/>

  <!-- Row 3: NoSQL (Open) -->
  <rect x="60" y="310" width="1080" height="90" fill="#f5f5f5"/>
  <text x="280" y="350" font-size="12" text-anchor="middle" fill="#333">NoSQL (Open)</text>
  <text x="650" y="350" font-size="12" text-anchor="middle" fill="#333">MongoDB, Cassandra</text>
  <text x="1000" y="350" font-size="12" text-anchor="middle" fill="#333">$400-1,200/mo</text>

  <line x1="450" y1="310" x2="450" y2="400" stroke="#ddd" stroke-width="1"/>
  <line x1="850" y1="310" x2="850" y2="400" stroke="#ddd" stroke-width="1"/>

  <!-- Row 4: NoSQL (Proprietary) -->
  <rect x="60" y="400" width="1080" height="90" fill="white"/>
  <text x="280" y="440" font-size="12" text-anchor="middle" fill="#333">NoSQL (Proprietary)</text>
  <text x="650" y="440" font-size="12" text-anchor="middle" fill="#333">Cosmos DB, DynamoDB</text>
  <text x="1000" y="440" font-size="12" text-anchor="middle" fill="#333">$1,500-9,000/mo</text>

  <line x1="450" y1="400" x2="450" y2="490" stroke="#ddd" stroke-width="1"/>
  <line x1="850" y1="400" x2="850" y2="490" stroke="#ddd" stroke-width="1"/>

  <!-- Row 5: Vector (Open) -->
  <rect x="60" y="490" width="1080" height="90" fill="#f5f5f5"/>
  <text x="280" y="530" font-size="12" text-anchor="middle" fill="#333">Vector (Open)</text>
  <text x="650" y="530" font-size="12" text-anchor="middle" fill="#333">Qdrant, Weaviate</text>
  <text x="1000" y="530" font-size="12" text-anchor="middle" fill="#333">$200-600/mo</text>

  <line x1="450" y1="490" x2="450" y2="580" stroke="#ddd" stroke-width="1"/>
  <line x1="850" y1="490" x2="850" y2="580" stroke="#ddd" stroke-width="1"/>

  <!-- Row 6: Vector (Proprietary) -->
  <rect x="60" y="580" width="1080" height="90" fill="white"/>
  <text x="280" y="620" font-size="12" text-anchor="middle" fill="#333">Vector (Proprietary)</text>
  <text x="650" y="620" font-size="12" text-anchor="middle" fill="#333">Pinecone, Azure AI</text>
  <text x="1000" y="620" font-size="12" text-anchor="middle" fill="#333">$1,000-5,000/mo</text>

  <line x1="450" y1="580" x2="450" y2="670" stroke="#ddd" stroke-width="1"/>
  <line x1="850" y1="580" x2="850" y2="670" stroke="#ddd" stroke-width="1"/>

  <!-- Outer table border -->
  <rect x="60" y="70" width="1080" height="600" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Footer note -->
  <text x="600" y="690" font-size="11" text-anchor="middle" fill="#666" font-style="italic">
    Proprietary options offer managed convenience but lock-in premiums.
  </text>
</svg>